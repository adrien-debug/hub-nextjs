<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Hearst Projects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #13131a;
            --bg-card: #1a1a24;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent-cyan: #00d4ff;
            --accent-blue: #4a90ff;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff4444;
            --border: #2a2a38;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-section {
            max-width: 400px;
            margin: 4rem auto;
            padding: 2rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .login-section h2 {
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            width: 100%;
        }

        .btn-primary:hover {
            background: var(--accent-blue);
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--success);
            color: var(--bg-primary);
        }

        .btn-warning {
            background: var(--warning);
            color: var(--bg-primary);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        .dashboard {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .dashboard.active {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-cyan);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .projects-table {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .table-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--bg-secondary);
            padding: 1rem;
            text-align: left;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        tr:hover {
            background: var(--bg-secondary);
        }

        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-live {
            background: rgba(0, 255, 136, 0.2);
            color: var(--success);
        }

        .status-coming {
            background: rgba(255, 170, 0, 0.2);
            color: var(--warning);
        }

        .status-future {
            background: rgba(74, 144, 255, 0.2);
            color: var(--accent-blue);
        }

        .published-badge {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--success);
        }

        .unpublished-badge {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-secondary);
        }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }

        .success-message {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }

        .hidden {
            display: none;
        }

        .user-info {
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logout-btn {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .logout-btn:hover {
            background: var(--danger);
            color: white;
        }
    </style>
</head>
<body>
    <!-- Login Section -->
    <div id="loginSection" class="login-section">
        <h2>🔐 Admin Login</h2>
        <div id="loginError" class="error-message hidden"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" value="admin" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" value="admin123" required>
            </div>
            <button type="submit" class="btn btn-primary">Se connecter</button>
        </form>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard">
        <div class="header">
            <h1>📊 Admin Dashboard</h1>
            <div class="user-info">
                <span id="userInfo"></span>
                <button class="logout-btn" onclick="logout()">Déconnexion</button>
            </div>
        </div>

        <div id="message" class="hidden"></div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-number" id="totalProjects">0</div>
                <div class="stat-label">Total Projets</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="publishedProjects">0</div>
                <div class="stat-label">Publiés</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="liveProjects">0</div>
                <div class="stat-label">Live</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="comingProjects">0</div>
                <div class="stat-label">Coming Soon</div>
            </div>
        </div>

        <!-- Projects Table -->
        <div class="projects-table">
            <div class="table-header">
                <h2>Gestion des Projets</h2>
                <button class="btn btn-success btn-sm" onclick="loadProjects()">🔄 Rafraîchir</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Nom</th>
                        <th>Status</th>
                        <th>Catégorie</th>
                        <th>Publié</th>
                        <th>Port</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="projectsTable">
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 2rem;">
                            Chargement...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5001/api';
        let token = localStorage.getItem('token');
        let currentUser = null;

        // Auto-login si token existe
        if (token) {
            verifyToken();
        }

        // Login form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    token = data.data.token;
                    currentUser = data.data.user;
                    localStorage.setItem('token', token);
                    showDashboard();
                } else {
                    showError('loginError', data.error || 'Login failed');
                }
            } catch (error) {
                showError('loginError', 'Erreur de connexion: ' + error.message);
            }
        });

        async function verifyToken() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (data.success) {
                    currentUser = data.data;
                    showDashboard();
                } else {
                    localStorage.removeItem('token');
                    token = null;
                }
            } catch (error) {
                localStorage.removeItem('token');
                token = null;
            }
        }

        function showDashboard() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
            document.getElementById('userInfo').textContent = `${currentUser.username} (${currentUser.role})`;
            loadProjects();
            loadStatistics();
        }

        function logout() {
            localStorage.removeItem('token');
            token = null;
            currentUser = null;
            location.reload();
        }

        async function loadStatistics() {
            try {
                const response = await fetch(`${API_URL}/projects/statistics`);
                const data = await response.json();

                if (data.success) {
                    const stats = data.data;
                    document.getElementById('totalProjects').textContent = stats.total;
                    document.getElementById('publishedProjects').textContent = stats.published;
                    document.getElementById('liveProjects').textContent = stats.by_status.live?.total || 0;
                    document.getElementById('comingProjects').textContent = stats.by_status.coming?.total || 0;
                }
            } catch (error) {
                console.error('Failed to load statistics:', error);
            }
        }

        async function loadProjects() {
            try {
                const response = await fetch(`${API_URL}/projects?limit=100`);
                const data = await response.json();

                if (data.success) {
                    renderProjects(data.data);
                }
            } catch (error) {
                console.error('Failed to load projects:', error);
            }
        }

        function renderProjects(projects) {
            const tbody = document.getElementById('projectsTable');
            
            if (projects.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem;">Aucun projet</td></tr>';
                return;
            }

            tbody.innerHTML = projects.map(project => `
                <tr>
                    <td><strong>${project.name}</strong></td>
                    <td><span class="status-badge status-${project.status}">${project.status}</span></td>
                    <td>${project.category}</td>
                    <td>
                        <span class="${project.published ? 'published-badge' : 'unpublished-badge'}" 
                              title="${project.published ? 'Publié' : 'Non publié'}"></span>
                    </td>
                    <td>${project.port || '-'}</td>
                    <td>
                        <div class="actions">
                            ${project.published 
                                ? `<button class="btn btn-warning btn-sm" onclick="unpublishProject('${project.id}')">Dépublier</button>`
                                : `<button class="btn btn-success btn-sm" onclick="publishProject('${project.id}')">Publier</button>`
                            }
                            <button class="btn btn-danger btn-sm" onclick="deleteProject('${project.id}', '${project.name}')">Supprimer</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function publishProject(id) {
            try {
                const response = await fetch(`${API_URL}/projects/${id}/publish`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('✅ Projet publié avec succès !', 'success');
                    loadProjects();
                    loadStatistics();
                } else {
                    showMessage('❌ Erreur: ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('❌ Erreur: ' + error.message, 'error');
            }
        }

        async function unpublishProject(id) {
            try {
                const response = await fetch(`${API_URL}/projects/${id}/unpublish`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('✅ Projet dépublié avec succès !', 'success');
                    loadProjects();
                    loadStatistics();
                } else {
                    showMessage('❌ Erreur: ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('❌ Erreur: ' + error.message, 'error');
            }
        }

        async function deleteProject(id, name) {
            if (!confirm(`Êtes-vous sûr de vouloir supprimer le projet "${name}" ?\n\nCette action est irréversible.`)) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/projects/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('✅ Projet supprimé avec succès !', 'success');
                    loadProjects();
                    loadStatistics();
                } else {
                    showMessage('❌ Erreur: ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('❌ Erreur: ' + error.message, 'error');
            }
        }

        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.remove('hidden');
        }

        function showMessage(message, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = message;
            messageEl.className = type === 'success' ? 'success-message' : 'error-message';
            messageEl.classList.remove('hidden');

            setTimeout(() => {
                messageEl.classList.add('hidden');
            }, 5000);
        }
    </script>
</body>
</html>
